<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>中文 Post Skill 批量盲测</title><link rel="stylesheet" href="chinese-post-benchmark.css"></head><body>
<main><h1>中文 Post Skill 批量盲测</h1><p>24 条真实 Studio A/B，预计 240–288 次模型调用。不会发布到 X。</p>
<section class="actions"><button id="benchmark-start">开始新测试</button><button id="benchmark-continue">继续运行</button><button id="benchmark-reset" class="secondary">重置</button></section>
<section id="benchmark-progress" class="panel">尚未开始</section>
<section id="benchmark-review" class="panel hidden"><h2>本轮 10 条内容</h2><div id="benchmark-review-list"></div><label for="benchmark-feedback">集中审核</label><textarea id="benchmark-feedback" rows="5" placeholder="例如：整体 70 分；2、6 最好；4、9 AI 味重；观点不够具体。"></textarea><button id="benchmark-submit-review">提交本轮审核</button></section>
<section id="benchmark-report" class="panel hidden"></section></main><script type="module" src="chinese-post-benchmark.js"></script></body></html>
